name: CI - Quality & Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff (lint & format)
        run: uv run ruff check src/ tests/ && uv run ruff format src/ tests/ --check

      - name: Black (formatting check)
        run: uv run black src/ tests/ --check

      - name: Mypy (strict type checking)
        run: uv run mypy src/ --strict

      - name: Pytest (unit tests)
        run: uv run pytest tests/ -v --cov=src --cov-report=xml

  docker-check:
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agencia-viagens-ia .

      - name: Verify Docker image
        run: docker run --rm -e GROQ_API_KEY=mock -e SERPER_API_KEY=mock -e GOOGLE_API_KEY=mock agencia-viagens-ia pytest tests/ -v
